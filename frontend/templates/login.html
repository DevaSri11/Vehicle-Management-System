<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ANPR Admin Login</title>
    <style>
        * {
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
        }

        body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(135deg, #19183B, #09122C);
        display: flex;
        justify-content: center;
        align-items: center;
        }

        .login-container {
        width: 100%;
        display: flex;
        justify-content: center;
        }

        .login-card {
        background: white;
        width: 360px;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .login-card h2 {
        margin-bottom: 30px;
        font-weight: 700;
        border-bottom: 3px solid #210454;
        display: inline-block;
        padding-bottom: 5px;
        }

        .input-group {
        position: relative;
        margin-bottom: 25px;
        }

        .input-group input {
        width: 100%;
        padding: 10px 0;
        border: none;
        border-bottom: 2px solid #ccc;
        outline: none;
        font-size: 16px;
        }

        .input-group label {
        position: absolute;
        left: 0;
        top: 10px;
        color: #999;
        font-size: 14px;
        pointer-events: none;
        transition: 0.3s;
        }

        .input-group input:focus + label,
        .input-group input:valid + label {
        top: -12px;
        font-size: 12px;
        color: #150433;
        }

        button {
        width: 100%;
        background: #0e0322;
        border: none;
        padding: 12px;
        border-radius: 8px;
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        }

        button:hover {
        background: #240e46;
        }

        .signup-text {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        }

        .signup-text a {
        color: #150433;
        font-weight: 600;
        text-decoration: none;
        }

        .error {
        color: red;
        font-size: 14px;
        margin-bottom: 10px;
        }

    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">

        <h2>Login</h2>

        <form method="POST" action="/">
            <div class="input-group">
                <input type="text" name="username" required>
                <label>Username</label>
            </div>

            <div class="input-group">
                <input type="password" name="password" required>
                <label>Password</label>
            </div>

            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}

            <button type="submit">Login</button>
        </form>

        <p class="signup-text">
            Don’t have an account?
            <a href="{{ url_for('register') }}">Signup now</a>
        </p>

    </div>
</div>

</body>
</html>
